<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Port Manager Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-panel">
        <p class="eyebrow">Node.js + Electron</p>
        <h1>Port Manager Desktop</h1>
        <p class="intro">
          macOS와 Windows에서 현재 점유 중인 포트를 조회하고, 선택한 PID를 종료할 수 있는 데스크톱 앱입니다.
        </p>

        <section class="admin-card" id="admin-card">
          <div>
            <p class="card-label">권한 상태</p>
            <strong id="admin-label">확인 중...</strong>
          </div>
          <button id="elevate-button" class="ghost-button">관리자 권한 요청</button>
        </section>

        <section class="summary-grid">
          <article>
            <span>전체 포트</span>
            <strong id="summary-total">0</strong>
          </article>
          <article>
            <span>TCP</span>
            <strong id="summary-tcp">0</strong>
          </article>
          <article>
            <span>UDP</span>
            <strong id="summary-udp">0</strong>
          </article>
        </section>
      </aside>

      <main class="content-panel">
        <header class="toolbar">
          <div class="toolbar-title">
            <h2>포트 목록</h2>
            <p id="last-updated">마지막 갱신 없음</p>
          </div>

          <div class="toolbar-actions">
            <input id="search-input" type="search" placeholder="포트, 프로세스명, PID 검색" />
            <button id="refresh-button" class="primary-button">새로고침</button>
          </div>
        </header>

        <p id="status-message" class="status-message">포트 목록을 불러오는 중입니다.</p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>포트</th>
                <th>프로토콜</th>
                <th>프로세스</th>
                <th>PID</th>
                <th>상태</th>
                <th>로컬 주소</th>
                <th>원격 주소</th>
                <th>동작</th>
              </tr>
            </thead>
            <tbody id="ports-body"></tbody>
          </table>
        </div>
      </main>
    </div>

    <template id="row-template">
      <tr>
        <td data-field="port"></td>
        <td data-field="protocol"></td>
        <td data-field="processName"></td>
        <td data-field="pid"></td>
        <td data-field="state"></td>
        <td data-field="localAddress"></td>
        <td data-field="remoteAddress"></td>
        <td>
          <button class="kill-button">Kill</button>
        </td>
      </tr>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
